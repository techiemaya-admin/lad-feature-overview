name: Main Branch Protection

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  post-merge-validation:
    name: Post-Merge Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate merged code
        run: |
          echo "🔍 Validating merged code on main branch..."
          find backend -name "*.js" -type f -exec node --check {} \;
          if [ -f test-server.js ]; then
            echo "GEMINI_API_KEY=test-key" > .env
            timeout 10 node test-server.js &
            SERVER_PID=$!
            sleep 5
            if ps -p $SERVER_PID > /dev/null; then
              echo "✅ Server validation passed"
              kill $SERVER_PID 2>/dev/null || true
            else
              echo "❌ Server validation failed"
              exit 1
            fi
          else
            echo "ℹ️ No test-server.js present; skipping server startup test"
          fi

      - name: Create release tag
        if: success()
        run: |
          DATE=$(date +%Y.%m.%d)
          COMMIT_COUNT=$(git log --since="today 00:00" --oneline | wc -l)
          TAG="release-${DATE}-${COMMIT_COUNT}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Release $TAG - Auto-generated after merge to main" || true
          git push origin "$TAG" || echo "Tag already exists or push failed"
          echo "📦 Created release tag: $TAG"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Main Branch Validation Failed',
              body: `## Validation Failure
              
              The post-merge validation on main branch has failed.
              
              **Commit**: ${context.sha}
              **Workflow**: ${context.workflow}
              **Run**: ${context.runNumber}
              
              Please investigate and fix immediately.
              `,
              labels: ['bug', 'urgent', 'ci-failure']
            });

  sync-to-main-repos:
    name: Sync to Main Repositories
    needs: post-merge-validation
    runs-on: ubuntu-latest
    if: success()
    
    strategy:
      matrix:
        target: [backend, frontend]
      fail-fast: false
    
    steps:
      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Backend
        if: matrix.target == 'backend'
        run: |
          echo "🔄 Syncing backend to LAD-Backend repository..."
          echo "Backend sync handled by sync-to-main workflow"

      - name: Sync Frontend
        if: matrix.target == 'frontend'
        run: |
          echo "🔄 Syncing frontend to LAD-Frontend repository..."
          echo "Frontend sync handled by sync-to-main workflow"

  update-changelog:
    name: Update Changelog
    needs: post-merge-validation
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entry
        id: changelog
        run: |
          echo "Generating changelog entry..."
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          DATE=$(date +%Y-%m-%d)
          NEW_VERSION=$(date +%Y.%m.%d.%H%M)
          {
            echo "## [$NEW_VERSION] - $DATE"
            echo ""
            echo "### Changed"
            echo "$COMMITS"
            echo ""
          } > new_changelog.md
          if [ -f CHANGELOG.md ]; then
            cat new_changelog.md >> CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat new_changelog.md >> CHANGELOG.md
          fi
          rm new_changelog.md

      - name: Commit changelog
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if git diff --quiet CHANGELOG.md; then
            echo "No changes to changelog"
          else
            git add CHANGELOG.md
            git commit -m "chore: update changelog [skip ci]"
            git push
            echo "✅ Changelog updated"
          fi

  deployment-ready:
    name: Mark as Deployment Ready
    needs: [post-merge-validation, sync-to-main-repos]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment marker
        run: |
          echo "✅ All validations passed - Ready for deployment"
          echo "deployment_ready=true" >> $GITHUB_OUTPUT

      - name: Post success summary
        run: |
          echo "## 🎉 Main Branch Update Successful" >> $GITHUB_STEP_SUMMARY
          echo "All post-merge validations passed successfully!" >> $GITHUB_STEP_SUMMARY
